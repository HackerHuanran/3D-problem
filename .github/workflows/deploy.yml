name: Deploy to CloudBase

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          VITE_TCB_ENV_ID: ${{ secrets.VITE_TCB_ENV_ID }}

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase Static Hosting
        env:
          ENV_ID: ${{ secrets.VITE_TCB_ENV_ID }}
        run: |
          cd dist
          cloudbase hosting deploy . / -e $ENV_ID \
            --secretId ${{ secrets.TENCENT_SECRET_ID }} \
            --secretKey ${{ secrets.TENCENT_SECRET_KEY }}
