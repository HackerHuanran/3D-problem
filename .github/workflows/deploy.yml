name: Deploy to CloudBase

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          VITE_TCB_ENV_ID: ${{ secrets.VITE_TCB_ENV_ID }}

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase Static Hosting
        env:
          CLOUDBASE_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          CLOUDBASE_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          ENV_ID: ${{ secrets.VITE_TCB_ENV_ID }}
        run: |
          echo "SecretId length: ${#CLOUDBASE_SECRET_ID}  EnvId: $ENV_ID"
          cloudbase hosting deploy dist / -e $ENV_ID
