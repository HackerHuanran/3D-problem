name: Deploy to CloudBase

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          VITE_TCB_ENV_ID: ${{ secrets.VITE_TCB_ENV_ID }}

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Setup CloudBase Auth
        env:
          SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          node -e "
          const { mkdirSync, writeFileSync } = require('fs');
          const { join } = require('path');
          const dir = join(process.env.HOME, '.config', 'cloudbase_tool_config');
          mkdirSync(dir, { recursive: true });
          writeFileSync(join(dir, 'config.json'), JSON.stringify({
            secretId: process.env.SECRET_ID,
            secretKey: process.env.SECRET_KEY,
            token: '',
            isLogin: true
          }));
          console.log('Auth file written to', dir);
          "

      - name: Deploy to CloudBase Static Hosting
        env:
          ENV_ID: ${{ secrets.VITE_TCB_ENV_ID }}
        run: cloudbase hosting deploy dist / -e $ENV_ID
